name: Generate GGB file list

on:
  push:
    branches: [ main ]
    paths:
      - 'ggbfiles/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate files.json and version.json
        run: |
          # 1. 扫描 .ggb 文件，生成 files.json
          files=()
          for f in ggbfiles/*.ggb; do
            [ -f "$f" ] && files+=("$(basename "$f")")
          done
          echo '[' > files.json
          first=true
          for f in "${files[@]}"; do
            [ "$first" = true ] && first=false || echo ',' >> files.json
            echo "\"$f\"" >> files.json
          done
          echo ']' >> files.json

          # 2. 生成 version.json，使用当前时间戳作为版本号
          VERSION=$(date +%s)
          echo "{\"version\": ${VERSION}}" > version.json
          echo "Generated version.json: $(cat version.json)"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add files.json version.json
          git diff --staged --quiet || git commit -m "Update file list and version [skip ci]"
          git push