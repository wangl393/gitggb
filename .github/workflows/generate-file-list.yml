name: Generate GGB File List

on:
  push:
    branches:
      - main
    paths:
      - 'ggbfiles/**'

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate file list and inject into index.html
        run: |
          FILES_JSON=$(find ggbfiles -maxdepth 1 -name "*.ggb" -printf '%f\n' \
            | sort \
            | jq -R . \
            | jq -s -c .)

          echo "Generated:"
          echo "$FILES_JSON"

          sed -i \
            "s|const GGB_FILES = .*;|const GGB_FILES = $FILES_JSON;|g" \
            index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add index.html

          git diff --staged --quiet || git commit -m "Update GGB file list [skip ci]"

          git push