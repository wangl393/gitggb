<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>GGB文件预览</title>
</head>

<body>
    <select id="fileSelect"></select>
    <button id="previewBtn">打开预览</button>
    <button id="folderSelectBtn">刷新文件列表</button>
    <div id="folderError" style="color:red;display:none"></div>
    <span id="fileCount"></span>

    <script>
        const fileSelect = document.getElementById('fileSelect');
        const previewBtn = document.getElementById('previewBtn');
        const folderSelectBtn = document.getElementById('folderSelectBtn');
        const folderError = document.getElementById('folderError');
        const fileCount = document.getElementById('fileCount');

        // 带缓存破除+重试完整版加载函数
        async function loadGgbFiles(retries = 3) {
            fileSelect.innerHTML = '<option value="">正在加载文件列表…</option>';
            fileSelect.disabled = true;
            previewBtn.disabled = true;
            folderError.style.display = 'none';

            for (let i = 0; i < retries; i++) {
                try {
                    const timestamp = Date.now();
                    const res = await fetch(`./files.json?t=${timestamp}`);
                    if (!res.ok) throw new Error(res.status);
                    const list = await res.json();
                    updateSelectMenu(list);
                    return;
                } catch (err) {
                    if (i === retries - 1) {
                        fileSelect.innerHTML = '<option value="">加载失败</option>';
                        folderError.textContent = '无法获取文件列表';
                        folderError.style.display = 'block';
                        fileCount.textContent = '';
                    } else {
                        await new Promise(r => setTimeout(r, 2000));
                    }
                }
            }
        }

        function updateSelectMenu(list) {
            fileSelect.innerHTML = '<option value="">请选择ggb文件</option>';
            list.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.innerText = name;
                fileSelect.appendChild(opt);
            })
            fileSelect.disabled = false;
            previewBtn.disabled = false;
            fileCount.textContent = `共${list.length}个文件`;
        }

        // 刷新按钮
        folderSelectBtn.onclick = async () => {
            folderSelectBtn.textContent = '正在刷新…';
            await loadGgbFiles();
            folderSelectBtn.textContent = '刷新文件列表';
        }

        // 页面初始化
        loadGgbFiles();

        // 预览按钮自行补充原有打开ggb逻辑
        previewBtn.onclick = () => {
            const name = fileSelect.value;
            if (!name) return;
            // 原有预览代码
        }
    </script>
</body>

</html>
